    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when libraries try to polyfill fetch in restricted environments
      (function() {
        try {
          const originalFetch = window.fetch;
          if (originalFetch) {
            const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
            if (descriptor && descriptor.configurable) {
              // If it's configurable, we can redefine it with a setter that does nothing
              // This prevents the "only a getter" error when libraries try to assign to it
              Object.defineProperty(window, 'fetch', {
                get: function() { return originalFetch; },
                set: function(v) { 
                  console.warn('ChatCV: Blocked attempt to overwrite window.fetch', v);
                  return originalFetch;
                },
                configurable: true,
                enumerable: true
              });
            } else if (descriptor && !descriptor.writable) {
              // If not configurable but we can't write to it, we might still be in trouble
              // but at least we tried. Some environments might throw here if we try to defineProperty.
              console.log('ChatCV: window.fetch is not configurable, skipping patch');
            }
          }
        } catch (e) {
          console.warn('ChatCV: Could not patch window.fetch', e);
        }
      })();
